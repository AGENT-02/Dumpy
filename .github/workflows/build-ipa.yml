name: Build Enterprise IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show Xcode version
      - name: Show Xcode version
        run: xcodebuild -version

      # 3. Install enterprise certificate
      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERT_PATH

          KEYCHAIN=$RUNNER_TEMP/build.keychain
          security create-keychain -p actions $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p actions $KEYCHAIN
          security import $CERT_PATH -k $KEYCHAIN -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions $KEYCHAIN

      # 4. Install In-House provisioning profile
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 5. Archive app
      - name: Archive app
        run: |
          xcodebuild \
            -project Dumpy/Dumpy.xcodeproj \
            -scheme Dumpy \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/Dumpy.xcarchive \
            archive

      # 6. Create ExportOptions.plist for Enterprise signing
      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>enterprise</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      # 7. Export IPA
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Dumpy.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build

      # 8. Upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Dumpy-Enterprise-IPA
          path: build/*.ipa
